<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Paws for a Cause</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css"/>
  <script src="scripts.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>


  <!-- FIXED HEADER -->
    <header>
    <a href="index.html" class = "logo">PAWS FOR A CAUSE</a>
    <nav aria-label="Primary">
        <ul class="nav-list">
        <li><a href="team.html">About Us</a></li>
        <li><a href="services.html" class="active">Our Work</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="involved.html">Get Involved</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
    <a href="https://buy.stripe.com/dRm9ATauZ8l51RO5ADf7i00" target="_blank" rel="noopener noreferrer" class="btn-donate">Donate Now</a>
    <div class="hamburger">☰</div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main">
    <div class="container login-container">
      <section class="login-section">
        <h2>Member Login</h2>
        <form class="login-form" action="#" novalidate>
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
          />

          <div class="login-buttons">
            <button type="submit" class="btn-submit">Login</button>
            <a href="index.html" class="btn-cancel">Cancel</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <!-- FOOTER -->
<footer>
    <p>&copy; <span data-year>2026</span> PAWS FOR A CAUSE | <a href="privacy.html">Privacy Policy</a></p>
    <div class="social">
      <a href="https://www.facebook.com/share/1BhGDBvNin/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" aria-label="PAWS FOR A CAUSE on Facebook (opens in new tab)">Facebook</a>
      <a href="https://www.instagram.com/pawsforacausemi" target="_blank" rel="noopener noreferrer" aria-label="PAWS FOR A CAUSE on Instagram (opens in new tab)">Instagram</a>
      <a href="mailto:pawsforacausemi@gmail.com" aria-label="Email PAWS FOR A CAUSE">Email</a>
    </div>
    <p class="footer-note">A youth-led 501(c)(3) nonprofit organization based in Michigan.</p>
  </footer>
</body>
</html>
